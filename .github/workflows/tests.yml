name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.5
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: sentinel2_brownfield
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: ${{ github.workspace }}
      DB_NAME: sentinel2_brownfield
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123
      COPERNICUS_USERNAME: test
      COPERNICUS_PASSWORD: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Create .env file
        run: |
          echo "DB_NAME=sentinel2_brownfield" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_USER=postgres" >> .env
          echo "DB_PASSWORD=postgres123" >> .env
          echo "COPERNICUS_USERNAME=test" >> .env
          echo "COPERNICUS_PASSWORD=test" >> .env

      - name: Set up database schema
        run: |
          PGPASSWORD=postgres123 psql -h 127.0.0.1 -U postgres -d sentinel2_brownfield -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          PGPASSWORD=postgres123 psql -h 127.0.0.1 -U postgres -d sentinel2_brownfield -c "
            CREATE TABLE council_boundaries (
              gss_code VARCHAR(9) PRIMARY KEY,
              name VARCHAR(100) NOT NULL,
              boundary GEOMETRY(GEOMETRY, 4326)
            );
            CREATE TABLE brownfield_sites (
              id SERIAL PRIMARY KEY,
              site_reference VARCHAR(50),
              gss_code VARCHAR(9) REFERENCES council_boundaries(gss_code),
              year INTEGER NOT NULL,
              name_address TEXT,
              utm_x FLOAT,
              utm_y FLOAT,
              hectares FLOAT,
              planning_status VARCHAR(100),
              location GEOMETRY(POINT, 32630),
              CONSTRAINT brownfield_sites_unique UNIQUE (site_reference, gss_code, year)
            );
            CREATE TABLE candidate_sites (
              id SERIAL PRIMARY KEY,
              gss_code VARCHAR(9) REFERENCES council_boundaries(gss_code),
              image_date DATE NOT NULL,
              run_timestamp TIMESTAMP NOT NULL,
              utm_x FLOAT,
              utm_y FLOAT,
              pixel_count INTEGER,
              bsi_value FLOAT,
              matched_site_reference VARCHAR(50)
            );
            CREATE TABLE pipeline_runs (
              id SERIAL PRIMARY KEY,
              gss_code VARCHAR(9) REFERENCES council_boundaries(gss_code),
              image_date DATE NOT NULL,
              run_timestamp TIMESTAMP NOT NULL,
              status VARCHAR(20),
              candidate_sites_found INTEGER,
              matched_to_register INTEGER,
              unmatched INTEGER
            );
            CREATE TABLE council_models (
              id SERIAL PRIMARY KEY,
              gss_code VARCHAR(9) REFERENCES council_boundaries(gss_code),
              trained_date DATE NOT NULL,
              training_sites INTEGER,
              accuracy FLOAT,
              precision_score FLOAT,
              recall_score FLOAT,
              image_date DATE,
              model_binary BYTEA
            );
          "

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_main.py \
            --ignore=tests/test_database_query.py \
            --ignore=tests/test_api_copernicus.py \
            --ignore=tests/test_aoi_clipping.py \
            --ignore=tests/test_data_loading_satellite.py \
            --ignore=tests/test_validation_satellite.py