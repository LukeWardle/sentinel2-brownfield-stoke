name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.5
        env:
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: sentinel2_brownfield
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: ${{ github.workspace }}
      DATABASE_URL: postgresql://postgres:postgres123@127.0.0.1:5432/sentinel2_brownfield
      COPERNICUS_USERNAME: test
      COPERNICUS_PASSWORD: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Create .env file
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres123@127.0.0.1:5432/sentinel2_brownfield" >> .env
          echo "COPERNICUS_USERNAME=test" >> .env
          echo "COPERNICUS_PASSWORD=test" >> .env

      - name: Set up database schema
        run: |
          PGPASSWORD=postgres123 psql -h 127.0.0.1 -U postgres -d sentinel2_brownfield -f migrations/001_initial_schema.sql
          PGPASSWORD=postgres123 psql -h 127.0.0.1 -U postgres -d sentinel2_brownfield -f migrations/002_exclusion_zones.sql
          PGPASSWORD=postgres123 psql -h 127.0.0.1 -U postgres -d sentinel2_brownfield -f migrations/003_candidate_geometry.sql

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_main.py \
            --ignore=tests/test_database_query.py \
            --ignore=tests/test_api_copernicus.py \
            --ignore=tests/test_aoi_clipping.py \
            --ignore=tests/test_data_loading_satellite.py \
            --ignore=tests/test_validation_satellite.py
